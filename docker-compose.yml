services:

  # ─────────────────────────────────────────────────────────────────
  # sentinelx-core
  #
  # SENTINEL_EXEC_MODE controls where commands are executed:
  #
  #   host  (default) — via nsenter into the host's PID namespace.
  #                     Requires pid=host + privileged=true below.
  #                     Full access to the host filesystem, systemd,
  #                     network and Docker daemon.
  #
  #   container       — inside this container only.
  #                     No special privileges needed.
  #                     Good for sandboxed or development workloads.
  # ─────────────────────────────────────────────────────────────────
  sentinelx-core:
    build:
      context: .
      dockerfile: core/Dockerfile
    container_name: sentinelx-core
    restart: unless-stopped

    # Required only when SENTINEL_EXEC_MODE=host.
    # Comment these two lines out when using container mode.
    pid: "host"
    privileged: true

    environment:
      SENTINEL_TOKEN: ${SENTINEL_TOKEN:?SENTINEL_TOKEN is required — see .env.example}
      SENTINEL_EXEC_MODE: ${SENTINEL_EXEC_MODE:-host}
      AGENT_PORT: "8091"
      LOG_DIR: /var/log/sentinelx
      LOG_FILE: /var/log/sentinelx/sentinelx.log
      LOG_EXEC_FILE: /var/log/sentinelx/exec.log
      # In host mode, /edit temp files must be on a path accessible both from
      # inside the container and from the host (where pensa-safe-edit runs via
      # nsenter). /tmp/sentinelx-uploads is bind-mounted for this purpose.
      SENTINEL_UPLOAD_DIR: ${SENTINEL_UPLOAD_DIR:-/tmp/sentinelx-uploads}

    volumes:
      - sentinelx-logs:/var/log/sentinelx
      - sentinelx-uploads:/var/lib/sentinelx
      - /tmp/sentinelx-uploads:/tmp/sentinelx-uploads

    ports:
      - "127.0.0.1:8091:8091"

    networks:
      - sentinelx-net

    healthcheck:
      test: ["CMD", "curl", "-sf",
             "-H", "Authorization: Bearer ${SENTINEL_TOKEN}",
             "http://localhost:8091/capabilities"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ─────────────────────────────────────────────────────────────────
  # sentinelx-mcp  (simple auth mode)
  #
  # MCP proxy between Claude/ChatGPT and the core agent.
  # In simple mode authentication is handled by SENTINEL_TOKEN only —
  # no OIDC provider needed. Suitable for personal use.
  #
  # To use full OIDC authentication, use docker-compose.oidc.yml
  # as an override:
  #   docker compose -f docker-compose.yml -f docker-compose.oidc.yml up -d
  # ─────────────────────────────────────────────────────────────────
  sentinelx-mcp:
    build:
      context: .
      dockerfile: mcp/Dockerfile
    container_name: sentinelx-mcp
    restart: unless-stopped
    depends_on:
      sentinelx-core:
        condition: service_healthy

    environment:
      MCP_PORT: "8099"
      SENTINELX_URL: "http://127.0.0.1:8091"
      SENTINEL_TOKEN: ${SENTINEL_TOKEN}
      # Simple mode: OIDC validation is disabled.
      # The MCP accepts any request that carries the correct SENTINEL_TOKEN.
      OIDC_ISSUER: ""
      OIDC_JWKS_URI: ""
      OIDC_EXPECTED_AUDIENCE: ""
      RESOURCE_URL: ${RESOURCE_URL:-https://sentinelx.example.com}
      AUTH_DEBUG: ${AUTH_DEBUG:-false}
      LOG_DIR: /var/log/sentinelx-mcp

    # network_mode: host gives the MCP access to the host network stack.
    # This is needed so it can reach 127.0.0.1:8091 (sentinelx-core)
    # and resolve external DNS (e.g. for OIDC JWKS fetches in oidc mode).
    network_mode: host

    volumes:
      - sentinelx-mcp-logs:/var/log/sentinelx-mcp

networks:
  sentinelx-net:
    driver: bridge

volumes:
  sentinelx-logs:
  sentinelx-uploads:
  sentinelx-mcp-logs:
