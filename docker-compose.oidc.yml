# docker-compose.oidc.yml — OIDC override for SentinelX (Keycloak)
#
# Adds Keycloak (identity provider) and PostgreSQL to the base stack.
# Use with:
#   docker compose -f docker-compose.yml -f docker-compose.oidc.yml up -d
#
# The install.sh script handles this automatically when you choose
# authentication mode: oidc.
#
# Keycloak supports Dynamic Client Registration (DCR) natively,
# which is required for Claude web/desktop to complete the OAuth flow
# automatically without the user having to enter a client_id.
#
# After first boot, keycloak-setup.py creates the realm, client and
# scopes automatically via the Keycloak API — no manual UI setup needed.

services:

  # ─────────────────────────────────────────────────────────────────
  # sentinelx-mcp override
  # Replaces the simple-auth MCP with full OIDC validation via Keycloak.
  # ─────────────────────────────────────────────────────────────────
  sentinelx-mcp:
    depends_on:
      sentinelx-core:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    environment:
      MCP_PORT: "8099"
      SENTINELX_URL: "http://127.0.0.1:8091"
      SENTINEL_TOKEN: ${SENTINEL_TOKEN}
      OIDC_ISSUER: ${OIDC_ISSUER:?OIDC_ISSUER is required in oidc mode — run install.sh}
      OIDC_JWKS_URI: ${OIDC_JWKS_URI:?OIDC_JWKS_URI is required in oidc mode}
      OIDC_EXPECTED_AUDIENCE: ${OIDC_EXPECTED_AUDIENCE:-}
      RESOURCE_URL: ${RESOURCE_URL:-https://sentinelx.example.com}
      AUTH_DEBUG: ${AUTH_DEBUG:-false}
      LOG_DIR: /var/log/sentinelx-mcp

  # ─────────────────────────────────────────────────────────────────
  # keycloak-db — PostgreSQL for Keycloak
  # ─────────────────────────────────────────────────────────────────
  keycloak-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KC_DB_PASSWORD:?KC_DB_PASSWORD is required}
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data
    networks:
      - keycloak-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─────────────────────────────────────────────────────────────────
  # keycloak — Identity provider (OIDC/OAuth2)
  #
  # Keycloak supports Dynamic Client Registration (DCR) natively —
  # Claude and ChatGPT can register themselves automatically without
  # the user having to enter a client_id.
  #
  # Admin console: https://<AUTH_DOMAIN>/admin
  # Admin user:    admin
  # Admin pass:    see KC_ADMIN_PASSWORD in .env
  # ─────────────────────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:26.5.6
    restart: unless-stopped
    command: start
    depends_on:
      keycloak-db:
        condition: service_healthy
    environment:
      # ── Admin credentials ────────────────────────────────────────
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD:?KC_ADMIN_PASSWORD is required}

      # ── Database ────────────────────────────────────────────────
      KC_DB: postgres
      KC_DB_URL_HOST: keycloak-db
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KC_DB_PASSWORD}

      # ── External access (behind nginx/Caddy reverse proxy) ──────
      KC_HOSTNAME: https://${AUTH_DOMAIN:?AUTH_DOMAIN is required in oidc mode}
      KC_HOSTNAME_STRICT: "true"
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded

      # ── Health + metrics ─────────────────────────────────────────
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"

    ports:
      - "127.0.0.1:8080:8080"

    networks:
      - keycloak-net
      - sentinelx-net

    healthcheck:
      test: ["CMD-SHELL", "{ printf 'GET /health/ready HTTP/1.0\\r\\n\\r\\n' >&0; grep '200'; } 0<>/dev/tcp/127.0.0.1/9000"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  # ─────────────────────────────────────────────────────────────────
  # keycloak-setup — one-shot container that runs after Keycloak boots
  #
  # Uses the Keycloak Admin REST API to:
  #   1. Create the sentinelx realm
  #   2. Create all sentinelx:* client scopes
  #   3. Create the sentinelx-mcp OIDC client with DCR-friendly config
  #   4. Enable open DCR so Claude/ChatGPT register automatically
  #   5. Patch /install/.env with OIDC_ISSUER, OIDC_JWKS_URI, CLIENT_ID
  #
  # Exits 0 on success. Run: docker compose logs keycloak-setup to debug.
  # ─────────────────────────────────────────────────────────────────
  keycloak-setup:
    image: python:3.12-slim
    restart: "no"
    depends_on:
      keycloak:
        condition: service_healthy
    environment:
      AUTH_DOMAIN: ${AUTH_DOMAIN}
      KC_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD}
      RESOURCE_URL: ${RESOURCE_URL:-https://sentinelx.example.com}
      INSTALL_DIR: /install
    volumes:
      - .:/install
      - ./scripts/keycloak-setup.py:/setup.py:ro
    networks:
      - keycloak-net
    command: python3 /setup.py

networks:
  sentinelx-net:
    driver: bridge
  keycloak-net:
    driver: bridge

volumes:
  keycloak-db-data: